<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563eb">
<title>Foto Portal</title>
<style>
  :root{--blue:#2563eb;--blue-dark:#1d4ed8;--green:#16a34a;--red:#dc2626;--gray:#6b7280;--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .header{background:var(--blue);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
  .header-icon{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .header h1{font-size:17px;font-weight:600}
  .header p{font-size:12px;opacity:0.8;margin-top:1px}
  .container{padding:16px;max-width:480px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
  .card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px}
  label{display:block;font-size:14px;font-weight:500;margin-bottom:6px;color:var(--text)}
  select,input[type=text]{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:#fff;appearance:none;-webkit-appearance:none;outline:none;transition:border-color .15s}
  select:focus,input[type=text]:focus{border-color:var(--blue)}
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}

  .foto-list{display:flex;flex-direction:column;gap:12px}
  .foto-item{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#f8fafc}
  .foto-item-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:#fff}
  .foto-item-num{font-size:13px;font-weight:600;color:var(--muted)}
  .btn-remove{background:none;border:none;color:var(--red);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px}
  .btn-remove:hover{background:#fef2f2}
  .foto-item-body{padding:12px}
  .foto-thumb{width:100%;max-height:180px;object-fit:cover;border-radius:8px;margin-bottom:10px;display:none}
  .foto-pick{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:6px;border:2px dashed var(--border);border-radius:8px;cursor:pointer;position:relative;transition:border-color .15s}
  .foto-pick:hover{border-color:var(--blue)}
  .foto-pick input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .foto-pick p{font-size:13px;color:var(--muted)}
  .foto-pick svg{opacity:0.35}
  .compress-info{font-size:12px;color:#15803d;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:6px 10px;margin-bottom:8px;display:none}
  .filename-tag{font-family:monospace;font-size:11px;background:#f1f5f9;border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--muted);margin-top:6px;word-break:break-all;display:none}

  .btn-add{width:100%;padding:12px;border:1.5px dashed var(--blue);border-radius:12px;background:transparent;color:var(--blue);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;margin-bottom:14px}
  .btn-add:hover{background:#eff6ff}
  .btn-send{width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-send:hover{background:var(--blue-dark)}
  .btn-send:disabled{opacity:0.5;cursor:not-allowed}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;transition:transform .3s ease;z-index:100;white-space:nowrap;max-width:90vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.success{background:var(--green)}
  .toast.error{background:var(--red)}
  .progress-bar{height:4px;background:#bfdbfe;border-radius:2px;margin-bottom:14px;display:none}
  .progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s}
  .info-bar{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px;font-size:13px;color:#1d4ed8;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📷</div>
  <div>
    <h1>Foto Portal</h1>
    <p>Projectdocumentatie</p>
  </div>
</div>

<div class="container">

  <div class="info-bar">
    <span>ℹ️</span>
    <span>Selecteer project en PO-nummer, voeg daarna foto's toe met elk een eigen omschrijving.</span>
  </div>

  <div class="card">
    <div class="card-title">Projectgegevens</div>
    <div class="field">
      <label>Projectnummer</label>
      <select id="project" onchange="updateAll()">
        <option value="">— selecteer project —</option>
        <option value="PRJ-2024-001">PRJ-2024-001 · Renovatie hal A</option>
        <option value="PRJ-2024-002">PRJ-2024-002 · Nieuwbouw entree</option>
        <option value="PRJ-2024-003">PRJ-2024-003 · Staalconstructie B2</option>
        <option value="PRJ-2025-001">PRJ-2025-001 · Onderhoud dak</option>
        <option value="PRJ-2025-002">PRJ-2025-002 · Installatie leidingen</option>
      </select>
    </div>
    <div class="field">
      <label>PO-nummer</label>
      <input type="text" id="po" placeholder="bijv. PO-8842 of 12345" autocomplete="off" oninput="updateAll()">
    </div>
  </div>

  <div class="foto-list" id="fotoList"></div>

  <button class="btn-add" onclick="addFoto()">+ Foto toevoegen</button>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <button class="btn-send" id="sendBtn" onclick="sendAll()" disabled>
    <span id="sendLabel">Verstuur alle foto's</span>
    <div class="spinner" id="spinner"></div>
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
let fotos = [];
let fotoId = 0;

function g(id){return document.getElementById(id)}
function pad(n){return String(n).padStart(2,'0')}
function today(){const d=new Date();return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`}
function slug(s){return s.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'')}

function fname(po, desc){
  const p = slug(po||''); const d = slug(desc||'');
  if(!p||!d) return '';
  return `${today()}-${p}-${d}.jpg`;
}

function addFoto(){
  const id = ++fotoId;
  fotos.push({id, b64:null, size:0, desc:''});
  renderList();
}

function removeFoto(id){
  fotos = fotos.filter(f=>f.id!==id);
  renderList();
  checkReady();
}

function renderList(){
  const list = g('fotoList');
  list.innerHTML='';
  fotos.forEach((f,i)=>{
    const div = document.createElement('div');
    div.className='foto-item';
    div.id='foto-item-'+f.id;
    div.innerHTML=`
      <div class="foto-item-header">
        <span class="foto-item-num">Foto ${i+1}</span>
        <button class="btn-remove" onclick="removeFoto(${f.id})">Verwijder</button>
      </div>
      <div class="foto-item-body">
        <img id="thumb-${f.id}" class="foto-thumb" alt="preview">
        <div class="compress-info" id="ci-${f.id}"></div>
        <div class="foto-pick" id="pick-${f.id}" ${f.b64?'style="display:none"':''}>
          <input type="file" accept="image/*" capture="environment" onchange="handleFile(${f.id}, this)">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <p>Tik om foto te maken of te kiezen</p>
        </div>
        <div class="field" style="margin-top:10px">
          <label style="font-size:13px">Omschrijving</label>
          <input type="text" placeholder="bijv. lasnaad voorzijde" value="${f.desc}" oninput="updateDesc(${f.id}, this.value)" autocomplete="off">
        </div>
        <div class="filename-tag" id="fn-${f.id}"></div>
      </div>`;
    list.appendChild(div);
    if(f.b64){
      const thumb = g('thumb-'+f.id);
      thumb.src = 'data:image/jpeg;base64,'+f.b64;
      thumb.style.display='block';
      const ci = g('ci-'+f.id);
      ci.style.display='block';
      ci.textContent = f.ciText||'';
    }
    updateFilename(f.id);
  });
}

function updateDesc(id, val){
  const f = fotos.find(x=>x.id===id);
  if(f){f.desc=val; updateFilename(id); checkReady();}
}

function updateFilename(id){
  const f = fotos.find(x=>x.id===id);
  const fn = g('fn-'+id);
  if(!fn||!f) return;
  const po = g('po').value.trim();
  const n = fname(po, f.desc);
  if(n){fn.textContent=n; fn.style.display='block';}
  else{fn.style.display='none';}
}

function updateAll(){
  fotos.forEach(f=>updateFilename(f.id));
  checkReady();
}

async function handleFile(id, input){
  const file = input.files[0]; if(!file) return;
  const f = fotos.find(x=>x.id===id); if(!f) return;
  const origKB = Math.round(file.size/1024);
  const ci = g('ci-'+id);
  ci.style.display='block'; ci.textContent='Comprimeren...';

  const img = new Image();
  const url = URL.createObjectURL(file);
  img.src=url;
  await new Promise(r=>img.onload=r);
  URL.revokeObjectURL(url);

  const MAX=9.5*1024*1024;
  let quality=0.85, w=img.naturalWidth, h=img.naturalHeight;
  if(w>2400){h=Math.round(h*2400/w);w=2400;}
  const canvas=document.createElement('canvas');
  canvas.width=w; canvas.height=h;
  canvas.getContext('2d').drawImage(img,0,0,w,h);

  let blob;
  do{
    blob=await new Promise(r=>canvas.toBlob(r,'image/jpeg',quality));
    quality-=0.08;
  }while(blob.size>MAX&&quality>0.2);

  const compKB=Math.round(blob.size/1024);
  const reader=new FileReader();
  reader.readAsDataURL(blob);
  await new Promise(r=>reader.onload=r);
  f.b64=reader.result.split(',')[1];
  f.size=blob.size;
  f.ciText=`Origineel: ${origKB} KB → Gecomprimeerd: ${compKB} KB`;

  const thumb=g('thumb-'+id);
  thumb.src=reader.result; thumb.style.display='block';
  const pick=g('pick-'+id);
  if(pick) pick.style.display='none';
  ci.textContent=f.ciText;

  updateFilename(id);
  checkReady();
}

function checkReady(){
  const proj=g('project').value;
  const po=g('po').value.trim();
  const allReady=fotos.length>0&&fotos.every(f=>f.b64&&f.desc.trim());
  g('sendBtn').disabled=!(proj&&po&&allReady);
}

function showToast(msg,type=''){
  const t=g('toast');
  t.textContent=msg; t.className='toast show '+type;
  setTimeout(()=>t.className='toast',3500);
}

async function sendAll(){
  const proj=g('project').value;
  const po=g('po').value.trim();
  g('sendBtn').disabled=true;
  g('spinner').style.display='block';
  const bar=g('progressBar'); bar.style.display='block';
  let sent=0;

  const RESEND_KEY = 'JOUW_RE_SLEUTEL_HIER';
  const FROM = 'onboarding@resend.dev';
  const TO = 'JOUW_ONTVANGST_EMAILADRES_HIER';

  for(const f of fotos){
    const n=fname(po,f.desc);
    g('sendLabel').textContent=`Versturen ${sent+1}/${fotos.length}...`;
    g('progressFill').style.width=Math.round((sent/fotos.length)*100)+'%';

    const body={
      from: FROM,
      to: [TO],
      subject: `[FOTOPORTAL] ${proj} | ${n}`,
      text: `Projectnummer: ${proj}\nPO-nummer: ${po}\nOmschrijving: ${f.desc}\nBestandsnaam: ${n}\n\nAutomatisch verstuurd via Foto Portal.`,
      attachments:[{content: f.b64, filename: n}]
    };
    try{
      const res=await fetch('https://api.resend.com/emails',{
        method:'POST',
        headers:{'Authorization':'Bearer '+RESEND_KEY,'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      if(!res.ok){
        const err=await res.text();
        console.error(err);
        showToast(`Fout bij foto ${sent+1}`,'error'); break;
      }
    }catch(e){showToast('Netwerkfout','error'); break;}
    sent++;
  }

  g('progressFill').style.width='100%';
  setTimeout(()=>bar.style.display='none',600);

  if(sent===fotos.length){
    showToast(`${sent} foto${sent>1?'s':''} verstuurd ✓`,'success');
    fotos=[];
    g('po').value='';
    g('project').value='';
    renderList();
  }

  g('sendBtn').disabled=false;
  g('sendLabel').textContent='Verstuur alle foto\'s';
  g('spinner').style.display='none';
  checkReady();
}

addFoto();
</script>
</body>
</html>
